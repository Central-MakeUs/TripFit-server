name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tripfit-server

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "full=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.full }}:${{ github.sha }}
            ${{ steps.image.outputs.full }}:latest

      - name: Deploy to EC2 A
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_IMAGE: ${{ steps.image.outputs.full }}:latest
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,GHCR_IMAGE,GHCR_USER
          script: |
            set -euo pipefail
            if [[ -n "${GHCR_PAT:-}" ]]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            if [[ -f .env ]]; then
              set -a
              # shellcheck disable=SC1091
              source .env
              set +a
            fi
            export GHCR_IMAGE
            docker compose pull app
            docker compose up -d app
            app_port="${APP_PORT:-8080}"
            for i in $(seq 1 24); do
              if curl -fsS "http://localhost:${app_port}/actuator/health/readiness" >/dev/null 2>&1; then
                echo "OK readiness"
                exit 0
              fi
              sleep 5
            done
            echo "FAIL readiness timeout"
            docker logs tripfit-app 2>&1 | tail -80
            exit 1
