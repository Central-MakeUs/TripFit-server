spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:tripfit}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
