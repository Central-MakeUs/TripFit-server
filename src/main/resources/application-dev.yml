# EC2 개발/통합 환경 — 1단계: ERD 탐색 (docker-compose 기본 프로필)
# 2단계 전환 시: ddl-auto update + flyway baseline-on-migrate
# 3단계(운영): prod 프로필로 전환 (validate + flyway full)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:tripfit}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
